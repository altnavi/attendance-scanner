<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DNI Scanner Pro</title>

  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* Adjusted to match the ultra-wide aspect ratio of a PDF417 barcode */
    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 520px;
      height: 160px;
      transform: translate(-50%, -50%);
      border: 3px solid lime;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      border-radius: 8px;
      pointer-events: none;
    }

    #canvas {
      display: none; /* Keep hidden. Change to display: block for troubleshooting */
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 18px;
    }

    #name {
      position: fixed;
      bottom: 60px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 20px;
    }

    .ok { color: lime !important; }
    .bad { color: red !important; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="roi"></div>

<canvas id="canvas"></canvas>

<div id="status">Starting camera...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

/* =========================
   STATE & HINTS
========================= */
let reader;
let scanning = true;

// Define specific decoding parameters to drastically push computational focus
const hints = new Map();
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.PDF_417]);
hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
hints.set(ZXing.DecodeHintType.CHARACTER_SET, "UTF-8");

/* =========================
   ELEMENTS (CACHE ONCE)
========================= */
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const roiEl = document.getElementById("roi");
const statusEl = document.getElementById("status");
const nameEl = document.getElementById("name");

function setStatus(t, cls="") {
  statusEl.textContent = t;
  statusEl.className = cls;
}

/* =========================
   PARSE PDF417 DNI DATA
========================= */
function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: (p[4] || "").trim(),
    apellido: (p[1] || "").trim(),
    nombre: (p[2] || "").trim()
  };
}

/* =========================
   ROI CROP COORDINATES
========================= */
function getCrop() {
  const rect = video.getBoundingClientRect();
  const roi = roiEl.getBoundingClientRect();

  const scaleX = video.videoWidth / rect.width;
  const scaleY = video.videoHeight / rect.height;

  const sx = (roi.left - rect.left) * scaleX;
  const sy = (roi.top - rect.top) * scaleY;
  const sw = roi.width * scaleX;
  const sh = roi.height * scaleY;

  return { sx, sy, sw, sh };
}

/* =========================
   CAPTURE & ENHANCE FRAME
========================= */
function capture() {
  const { sx, sy, sw, sh } = getCrop();

  canvas.width = sw;
  canvas.height = sh;

  // Clear previous allocations
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Apply real-time sharpness filter directly to canvas element layer before capture
  ctx.filter = "contrast(1.4) grayscale(1)"; 

  ctx.drawImage(
    video,
    sx, sy, sw, sh,
    0, 0,
    canvas.width,
    canvas.height
  );

  return canvas;
}

/* =========================
   API POST SEND
========================= */
function send(data) {
  setStatus("Processing...");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain" }
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === "OK") {
      setStatus("OK", "ok");
      nameEl.textContent = res.nombre + " " + res.apellido;
    } else {
      setStatus("NOT FOUND", "bad");
      nameEl.textContent = "";
    }
    
    // Pause for 2.5 seconds so user can see result, then resume
    setTimeout(() => {
      scanning = true;
      setStatus("Scanning...");
      loop();
    }, 2500);
  })
  .catch(e => {
    setStatus("Error: " + e.toString(), "bad");
    setTimeout(() => {
      scanning = true;
      setStatus("Scanning...");
      loop();
    }, 3000);
  });
}

/* =========================
   STABLE ASYNC SCAN LOOP
========================= */
function loop() {
  if (!scanning) return;

  if (video.videoWidth === 0 || video.videoHeight === 0) {
    requestAnimationFrame(loop);
    return;
  }

  try {
    const croppedCanvas = capture();

    // Use decode with performance configurations applied
    reader.decode(croppedCanvas)
      .then(result => {
        scanning = false; // Freeze immediately
        const data = parseDNI(result.getText());
        send(data);
      })
      .catch(() => {
        // If nothing found, try again in 120ms to allow smooth focus change
        if (scanning) {
          setTimeout(loop, 120);
        }
      });

  } catch (e) {
    console.error(e);
    if (scanning) setTimeout(loop, 1000);
  }
}

/* =========================
   INITIALIZE WEBCAM & DEVICE
========================= */
async function start() {
  setStatus("Starting camera...");

  try {
    // Request full high-definition stream for density resolution processing
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920, min: 1280 },
        height: { ideal: 1080, min: 720 }
      }
    });

    video.srcObject = stream;
    await video.play();

    // Initialize custom multi-format instance bound with strict configurations
    reader = new ZXing.BrowserMultiFormatReader(hints);

    setStatus("Scanning...");
    loop();

  } catch (err) {
    console.error(err);
    setStatus("Camera initialization failed: " + err.message, "bad");
  }
}

start();

</script>

</body>
</html>
