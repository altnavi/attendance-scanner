<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scanner</title>

  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 360px;
      transform: translate(-50%, -50%);
      border: 2px solid lime;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      border-radius: 10px;
      pointer-events: none;
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    #name {
      position: fixed;
      bottom: 50px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    .ok { color: lime; }
    .bad { color: red; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="roi"></div>

<canvas id="canvas"></canvas>

<div id="status">Starting...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

/* =========================
   STATE
========================= */

let reader;
let scanning = true;

/* =========================
   ELEMENTS (CACHE ONCE)
========================= */

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const roiEl = document.getElementById("roi");

const statusEl = document.getElementById("status");
const nameEl = document.getElementById("name");

/* =========================
   STATUS
========================= */

function setStatus(t, cls="") {
  statusEl.textContent = t;
  statusEl.className = cls;
}

/* =========================
   PARSE PDF417
========================= */

function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: p[4] || "",
    apellido: p[1] || "",
    nombre: p[2] || ""
  };
}

/* =========================
   ROI CROP (FIXED)
========================= */

function getCrop() {

  const r = roiEl.getBoundingClientRect();

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const scaleX = vw / window.innerWidth;
  const scaleY = vh / window.innerHeight;

  const sx = r.left * scaleX;
  const sy = r.top * scaleY;
  const sw = r.width * scaleX;
  const sh = r.height * scaleY;

  return { sx, sy, sw, sh };
}

/* =========================
   CAPTURE FRAME
========================= */

function capture() {

  const { sx, sy, sw, sh } = getCrop();

  const DOWNSCALE = 0.8;

  canvas.width = sw * DOWNSCALE;
  canvas.height = sh * DOWNSCALE;

  ctx.drawImage(
    video,
    sx, sy, sw, sh,
    0, 0,
    canvas.width,
    canvas.height
  );

  return canvas;
}

/* =========================
   SEND
========================= */

function send(data) {

  setStatus("Processing...");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain" }
  })
  .then(r => r.json())
  .then(res => {

    if (res.status === "OK") {
      setStatus("OK", "ok");
      nameEl.textContent = res.nombre + " " + res.apellido;
    } else {
      setStatus("NOT FOUND", "bad");
      nameEl.textContent = "";
    }

    scanning = true;
  })
  .catch(e => {
    setStatus(e.toString(), "bad");
    scanning = true;
  });
}

/* =========================
   SCAN LOOP (CLEAN)
========================= */

function loop() {

  if (!scanning) return;

  try {

    const canvas = capture();

    reader.decodeFromCanvas(canvas)
      .then(result => {

        scanning = false;

        const data = parseDNI(result.getText());

        send(data);

      })
      .catch(() => {
        // ignore no scan
      });

  } catch (e) {
    console.error(e);
  }

  requestAnimationFrame(loop);
}

/* =========================
   START
========================= */

async function start() {

  setStatus("Starting...");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  });

  video.srcObject = stream;
  await video.play();

  reader = new ZXing.BrowserMultiFormatReader();

  setStatus("Scanning...");

  loop();
}

start();

</script>

</body>
</html>
