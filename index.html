<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DNI Scanner - Stable Native Loop</title>

  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* Traditional clear scanning window overlay */
    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 80vw;
      height: 160px;
      transform: translate(-50%, -50%);
      border: 3px solid lime;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      border-radius: 8px;
      pointer-events: none;
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 18px;
    }

    #name {
      position: fixed;
      bottom: 60px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 20px;
    }

    .ok { color: lime !important; }
    .bad { color: red !important; }
  </style>
</head>

<body>

<video id="video" playsinline></video>
<div id="roi"></div>

<div id="status">Initializing Scanner...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

let reader;
const video = document.getElementById("video");
const statusEl = document.getElementById("status");
const nameEl = document.getElementById("name");

function setStatus(t, cls="") {
  statusEl.textContent = t;
  statusEl.className = cls;
}

function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: (p[4] || "").trim(),
    apellido: (p[1] || "").trim(),
    nombre: (p[2] || "").trim()
  };
}

/* =========================
   SEND POST TO GOOGLE APPS
========================= */
function send(data) {
  setStatus("Processing API...");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain" }
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === "OK") {
      setStatus("OK", "ok");
      nameEl.textContent = res.nombre + " " + res.apellido;
    } else {
      setStatus("NOT FOUND", "bad");
      nameEl.textContent = "";
    }
    
    // Resume scanning after a 4-second delay so user can see verification
    setTimeout(() => {
      setStatus("Scanning...");
      startScanningLoop();
    }, 4000);
  })
  .catch(e => {
    setStatus("Error: " + e.toString(), "bad");
    setTimeout(() => {
      setStatus("Scanning...");
      startScanningLoop();
    }, 4000);
  });
}

/* =========================
   NATIVE DECODING LOOP
========================= */
function startScanningLoop() {
  // Use the canonical public method that natively attaches to video elements
  reader.decodeFromVideoElement(video, (result, error) => {
    if (result) {
      // Barcode recognized successfully! Stop the current instance listener
      reader.reset(); 
      
      setStatus("Code Found!");
      const data = parseDNI(result.getText());
      send(data);
    }
    
    if (error && !(error instanceof ZXing.NotFoundException)) {
      // Log true compilation/hardware faults, ignoring standard "no barcode seen" loops
      console.error(error);
    }
  });
}

/* =========================
   INITIALIZATION ENTRYPOINT
========================= */
async function start() {
  setStatus("Accessing Camera...");

  try {
    // 1. Establish precise processing rules focusing engine constraints onto PDF417 format structures
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.PDF_417]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    reader = new ZXing.BrowserMultiFormatReader(hints);

    // 2. Request environmental video hardware directly via explicit Media Stream targets
    const constraints = {
      video: {
        facingMode: "environment",
        width: { ideal: 1920, min: 1280 },
        height: { ideal: 1080, min: 720 }
      }
    };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    await video.play();

    setStatus("Scanning...");
    startScanningLoop();

  } catch (err) {
    console.error(err);
    setStatus("System Fault: " + err.message, "bad");
  }
}

// Start execution
start();

</script>

</body>
</html>
