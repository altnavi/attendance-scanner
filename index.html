<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DNI Scanner - WebAssembly Engine</title>

<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 80vw;
      height: 2px;
      background: lime;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px lime;
      pointer-events: none;
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 18px;
    }

    #name {
      position: fixed;
      bottom: 60px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 20px;
    }

    .ok { color: lime !important; }
    .bad { color: red !important; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="roi"></div>

<canvas id="canvas" style="display:none;"></canvas>

<div id="status">Loading WASM Engine...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

let zxingModule;
let isProcessingFrame = false;
let scanning = true;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const statusEl = document.getElementById("status");
const nameEl = document.getElementById("name");

function setStatus(t, cls="") {
  statusEl.textContent = t;
  statusEl.className = cls;
}

function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: (p[4] || "").trim(),
    apellido: (p[1] || "").trim(),
    nombre: (p[2] || "").trim()
  };
}

/* =========================
   SEQUENTIAL WASM SCAN LOOP
========================= */
async function loop() {
  if (!scanning || isProcessingFrame) return;

  if (video.videoWidth === 0 || video.videoHeight === 0) {
    requestAnimationFrame(loop);
    return;
  }

  isProcessingFrame = true;

  // Capture the frame details
  const w = video.videoWidth;
  const h = video.videoHeight;
  canvas.width = w;
  canvas.height = h;
  ctx.drawImage(video, 0, 0, w, h);

  try {
    // Extract raw image byte data array
    const imgData = ctx.getImageData(0, 0, w, h);
    
    // Call the C++ WebAssembly module directly using correct options syntax for 0.4.3
    const result = zxingModule.readBarcodeFromRGBA(imgData.data, w, h, {
      formats: "PDF417", // Single string parameter preferred by early bindings wrapper
      tryHarder: true,
      tryRotate: true
    });

    if (result && result.isValid) {
      scanning = false;
      const data = parseDNI(result.text);
      send(data);
    } else {
      // Release execution lock to cycle immediately if no code found
      isProcessingFrame = false;
      requestAnimationFrame(loop);
    }

  } catch (error) {
    console.error("WASM decoding crash: ", error);
    isProcessingFrame = false;
    setTimeout(loop, 250);
  }
}

/* =========================
   SEND POST
========================= */
function send(data) {
  setStatus("Processing API...");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain" }
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === "OK") {
      setStatus("OK", "ok");
      nameEl.textContent = res.nombre + " " + res.apellido;
    } else {
      setStatus("NOT FOUND", "bad");
      nameEl.textContent = "";
    }
    
    setTimeout(() => {
      scanning = true;
      isProcessingFrame = false;
      setStatus("Scanning...");
      loop();
    }, 3000);
  })
  .catch(e => {
    setStatus("Error: " + e.toString(), "bad");
    setTimeout(() => {
      scanning = true;
      isProcessingFrame = false;
      setStatus("Scanning...");
      loop();
    }, 3000);
  });
}

/* =========================
   INITIALIZE WEBCAM & WASM
========================= */
async function start() {
  try {
    // 1. Initialize the C++ WebAssembly Module
    zxingModule = await ZXingReader();
    setStatus("Camera initializing...");

    // 2. Spin up high-res video feed
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920, min: 1280 },
        height: { ideal: 1080, min: 720 }
      }
    });

    video.srcObject = stream;
    await video.play();

    setStatus("Scanning...");
    loop();

  } catch (err) {
    console.error(err);
    setStatus("Initialization error: " + err.message, "bad");
  }
}

start();

</script>

</body>
</html>
