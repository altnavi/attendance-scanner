<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNI Scanner</title>

  <!-- ZXing Multi-Format Engine -->
  <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: monospace;
    }

    #video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #roi {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 480px;
      max-width: 85vw;
      height: 160px;
      max-height: 30vh;
      transform: translate(-50%, -50%);
      border: 3px solid #00ff00;
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.65);
      pointer-events: none;
      z-index: 10;
    }

    #canvas {
      display: none;
    }

    #debugCanvas {
      position: fixed;
      right: 12px;
      top: 12px;
      width: 220px;
      border: 2px solid #ffff00;
      background: #000;
      z-index: 20;
    }

    #status {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 250px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 10px;
      border-radius: 6px;
      white-space: pre-wrap;
      font-size: 13px;
      z-index: 20;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Decoded result display banner */
    #resultBanner {
      position: fixed;
      bottom: 20px;
      left: 5%;
      width: 90%;
      padding: 16px;
      box-sizing: border-box;
      text-align: center;
      color: #fff;
      font-family: sans-serif;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.85);
      z-index: 30;
      display: none;
    }

    #name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    #badge {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }

    /* Status State Classes */
    .ok { color: #00ff00 !important; }
    .warn { color: #ffcc00 !important; }
    .bad { color: #ff3333 !important; }

    .banner-ok { border: 2px solid #00ff00; color: #00ff00; }
    .banner-warn { border: 2px solid #ffcc00; color: #ffcc00; }
    .banner-bad { border: 2px solid #ff3333; color: #ff3333; }

    /* Manual Input Toggle Button */
    #manualToggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      z-index: 40;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* Manual Input Modal */
    #manualModal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.9);
      z-index: 50;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }

    #manualModal input {
      padding: 12px;
      font-size: 18px;
      margin: 8px 0;
      width: 80%;
      max-width: 300px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    #manualModal button {
      padding: 12px 24px;
      margin-top: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      background: #28a745;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline muted></video>

  <div id="roi"></div>

  <canvas id="canvas"></canvas>
  <canvas id="debugCanvas"></canvas>

  <div id="status">Initializing...</div>

  <!-- Detailed Scan Result Banner -->
  <div id="resultBanner">
    <div id="name"></div>
    <div id="badge"></div>
  </div>

  <button id="manualToggle" onclick="toggleManualModal(true)">⌨ Manual Input</button>

  <!-- Fallback Modal for Manual Entry -->
  <div id="manualModal">
    <h3 style="color: white;">Manual Entry</h3>
    <input type="text" id="manualDni" placeholder="DNI Number" />
    <input type="text" id="manualNombre" placeholder="Nombre (Optional)" />
    <input type="text" id="manualApellido" placeholder="Apellido (Optional)" />
    <button onclick="submitManual()">Submit Attendance</button>
    <button onclick="toggleManualModal(false)" style="background: #dc3545; margin-top: 8px;">Cancel</button>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYI2FpyyYnEYg2OMn3uHn3v1sl-rsuJSoPqnJWdnBSHMi3Z1KO-NpKxRa1mAtNn7UE/exec";

    let pdfReader;
    let decodeCount = 0;
    let lastError = "";
    let lastMessage = "";
    let scanning = true;

    const video = document.getElementById("video");
    const roi = document.getElementById("roi");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    const debugCanvas = document.getElementById("debugCanvas");
    const debugCtx = debugCanvas.getContext("2d");

    const statusEl = document.getElementById("status");
    const bannerEl = document.getElementById("resultBanner");
    const nameEl = document.getElementById("name");
    const badgeEl = document.getElementById("badge");

    // Simple Synthesized Beep Feedback for Scans
    function playBeep(freq = 880, type = 'sine') {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.15);
        setTimeout(() => audioCtx.close(), 200);
      } catch (e) { }
    }

    function setStatus(text, cssClass = "") {
      statusEl.className = cssClass;
      const res = (video.videoWidth && video.videoHeight) 
        ? `${video.videoWidth}x${video.videoHeight}` 
        : "Detecting...";
      
      statusEl.textContent = 
        `Status     : ${text}
Camera Res : ${res}
Frames     : ${decodeCount}
Error      : ${lastError}
Message    : ${lastMessage}`;
    }

    function parseDNI(raw) {
      const p = raw.split("@");
      return {
        dni: p[4]?.trim() || p[1]?.trim() || "",
        apellido: p[1]?.trim() || "",
        nombre: p[2]?.trim() || ""
      };
    }

    function getCropGuide() {
      const vWidth = video.videoWidth;
      const vHeight = video.videoHeight;
      if (!vWidth || !vHeight) return null;

      const roiRect = roi.getBoundingClientRect();
      const videoRect = video.getBoundingClientRect();

      const scale = Math.max(videoRect.width / vWidth, videoRect.height / vHeight);
      const visibleWidth = videoRect.width / scale;
      const visibleHeight = videoRect.height / scale;

      const offsetX = (vWidth - visibleWidth) / 2;
      const offsetY = (vHeight - visibleHeight) / 2;

      const cropX = Math.round(offsetX + ((roiRect.left - videoRect.left) / scale));
      const cropY = Math.round(offsetY + ((roiRect.top - videoRect.top) / scale));
      const cropW = Math.round(roiRect.width / scale);
      const cropH = Math.round(roiRect.height / scale);

      const safeX = Math.max(0, Math.min(vWidth - 1, cropX));
      const safeY = Math.max(0, Math.min(vHeight - 1, cropY));
      const safeW = Math.min(vWidth - safeX, cropW);
      const safeH = Math.min(vHeight - safeY, cropH);

      return { x: safeX, y: safeY, w: safeW, h: safeH };
    }

    async function loop() {
      if (!scanning) return;

      try {
        if (!video.videoWidth || !video.videoHeight) {
          setTimeout(loop, 100);
          return;
        }

        const crop = getCropGuide();
        if (!crop || crop.w <= 0 || crop.h <= 0) {
          setTimeout(loop, 100);
          return;
        }

        if (canvas.width !== crop.w || canvas.height !== crop.h) {
          canvas.width = crop.w;
          canvas.height = crop.h;
        }

        ctx.drawImage(video, crop.x, crop.y, crop.w, crop.h, 0, 0, crop.w, crop.h);

        debugCanvas.width = 220;
        debugCanvas.height = Math.round(220 * (crop.h / crop.w));
        debugCtx.drawImage(canvas, 0, 0, debugCanvas.width, debugCanvas.height);

        decodeCount++;
        setStatus("Decoding frame...");

        const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
        const binarizer = new ZXing.HybridBinarizer(luminanceSource);
        const bitmap = new ZXing.BinaryBitmap(binarizer);

        const result = pdfReader.decode(bitmap);

        scanning = false;
        playBeep(880); // Audio tone on success
        const raw = result.getText();
        const data = parseDNI(raw);
        data.raw = raw;

        setStatus("Decoded successfully!", "ok");
        send(data);
        return;

      } catch (err) {
        if (
          err.name === "NotFoundException" || 
          err.name === "ChecksumException" || 
          err.name === "FormatException"
        ) {
          lastError = "Scanning...";
          lastMessage = "Keep PDF417 inside box";
        } else {
          lastError = err.name || "Error";
          lastMessage = err.message || String(err);
        }
      }

      setTimeout(loop, 80);
    }

    async function send(data) {
      setStatus("Sending to Google Sheet...");

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        bannerEl.style.display = "block";

        if (result.status === "OK") {
          bannerEl.className = "banner-ok";
          nameEl.textContent = `${result.nombre || data.nombre} ${result.apellido || data.apellido}`;
          badgeEl.textContent = `✔ REGISTRADO (${result.table || 'OK'})`;
          setStatus("Recorded!", "ok");
        } else if (result.status === "NO_ANOTADO") {
          bannerEl.className = "banner-warn";
          nameEl.textContent = `${data.nombre || 'DNI:'} ${data.apellido || data.dni}`;
          badgeEl.textContent = `⚠ NO ANOTADO (REGISTRADO AUTOMÁTICAMENTE)`;
          setStatus("Recorded as NO_ANOTADO", "warn");
        } else {
          bannerEl.className = "banner-bad";
          nameEl.textContent = "ERROR";
          badgeEl.textContent = result.message || "Request failed";
          setStatus(result.status, "bad");
        }
      } catch (err) {
        bannerEl.style.display = "block";
        bannerEl.className = "banner-bad";
        nameEl.textContent = "NETWORK ERROR";
        badgeEl.textContent = "Could not connect to Google Apps Script";
        lastError = err.name || "Error";
        lastMessage = err.message || "";
        setStatus("Network error", "bad");
      }

      // 2.5 second delay before re-enabling scanner feed
      setTimeout(() => {
        bannerEl.style.display = "none";
        scanning = true;
        loop();
      }, 2500);
    }

    function toggleManualModal(show) {
      document.getElementById("manualModal").style.display = show ? "flex" : "none";
      scanning = !show;
      if (!show) loop();
    }

    function submitManual() {
      const dni = document.getElementById("manualDni").value.trim();
      const nombre = document.getElementById("manualNombre").value.trim();
      const apellido = document.getElementById("manualApellido").value.trim();

      if (!dni) return alert("Please enter a DNI");

      toggleManualModal(false);
      send({ dni, nombre, apellido });
      
      // Reset inputs
      document.getElementById("manualDni").value = "";
      document.getElementById("manualNombre").value = "";
      document.getElementById("manualApellido").value = "";
    }

    async function start() {
      setStatus("Initializing camera...");

      try {
        pdfReader = new ZXing.PDF417Reader();

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 1920, min: 640 },
            height: { ideal: 1080, min: 480 },
            aspectRatio: { ideal: 1.7777777778 }
          }
        });

        video.srcObject = stream;
        await video.play();

        const track = stream.getVideoTracks()[0];
        if (track && 'applyConstraints' in track) {
          try {
            await track.applyConstraints({
              advanced: [{ focusMode: "continuous" }]
            });
          } catch (e) { }
        }

        setStatus("Scanning active...");
        loop();

      } catch (err) {
        lastError = err.name || "Error";
        lastMessage = err.message || String(err);
        setStatus("Camera failed to start", "bad");
      }
    }

    start();
  </script>
</body>

</html>
