<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Attendance Scanner</title>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@latest/umd/index.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 20px;
      background: #111;
      color: white;
    }

    video {
      width: 90%;
      max-width: 500px;
      border: 2px solid #444;
      border-radius: 10px;
      transform: scale(1.4);
      transform-origin: center;
    }

    .ok { color: lime; }
    .bad { color: red; }

    #scanBox {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 280px;
      height: 160px;
      transform: translate(-50%, -50%);
      border: 2px solid lime;
      border-radius: 10px;
      pointer-events: none;
    }

    #flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
  </style>
</head>

<body>

<h2>Attendance Scanner</h2>

<video id="video" autoplay playsinline></video>

<div id="scanBox"></div>
<div id="flash"></div>

<h3 id="status">Starting...</h3>
<p id="name"></p>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

let codeReader;
let scanning = true;
let lastScanTime = 0;
const SCAN_DELAY = 250;

/* =========================
   PARSE PDF417 STRUCTURE
========================= */

function parseDNIData(raw) {

  const p = raw.split("@");

  return {
    dni: p[4] || "",
    apellido: p[1] || "",
    nombre: p[2] || ""
  };
}

/* =========================
   FLASH
========================= */

function flash() {
  const f = document.getElementById("flash");
  f.style.opacity = 1;
  setTimeout(() => f.style.opacity = 0, 120);
}

/* =========================
   CAMERA + SCANNER
========================= */

async function startScanner() {

  const video = document.getElementById("video");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    }
  });

  video.srcObject = stream;

  codeReader = new ZXingBrowser.BrowserMultiFormatReader();

  document.getElementById("status").textContent = "Scanning...";

  codeReader.decodeFromVideoDevice(
    undefined,
    video,
    (result) => {

      if (!result || !scanning) return;

      const now = Date.now();
      if (now - lastScanTime < SCAN_DELAY) return;
      lastScanTime = now;

      scanning = false;

      const parsed = parseDNIData(result.getText());

      send(parsed);

      setTimeout(() => scanning = true, 1200);
    }
  );
}

/* =========================
   SEND TO BACKEND
========================= */

function send(data) {

  flash();

  document.getElementById("status").textContent = "Processing...";

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "text/plain"
    }
  })
  .then(r => r.json())
  .then(showResult)
  .catch(err => {
    document.getElementById("status").textContent = err.toString();
  });
}

/* =========================
   RESULT UI
========================= */

function showResult(res) {

  if (res.status === "OK") {

    document.getElementById("status").className = "ok";
    document.getElementById("status").textContent = "OK";

    document.getElementById("name").textContent =
      res.nombre + " " + res.apellido;

  } else {

    document.getElementById("status").className = "bad";
    document.getElementById("status").textContent = "NOT FOUND";

    document.getElementById("name").textContent = "";
  }

}

/* =========================
   INIT
========================= */

startScanner();

</script>

</body>
</html>
