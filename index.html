<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Attendance Scanner</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    /* FULL SCREEN VIDEO */
    #video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* IMPORTANT: fills screen like native scanner */
      background: black;
    }

    /* CENTER SCAN BOX */
    #scanBox {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 280px;
      height: 160px;
      transform: translate(-50%, -50%);
      border: 2px solid lime;
      border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45); /* dark outside area */
      pointer-events: none;
    }

    /* STATUS */
    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
      font-size: 18px;
      z-index: 10;
    }

    #name {
      position: fixed;
      bottom: 50px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
      font-size: 16px;
      z-index: 10;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="scanBox"></div>

<div id="status">Starting camera...</div>
<div id="name"></div>

<script>

async function startCamera() {

  const video = document.getElementById("video");

  try {

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });

    video.srcObject = stream;

    await video.play();

    document.getElementById("status").textContent = "Camera ready";

  } catch (err) {

    document.getElementById("status").textContent =
      err.name + ": " + err.message;

  }
}

startCamera();

</script>

</body>
</html>
