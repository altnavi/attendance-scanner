<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scanner</title>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@latest/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* =========================
       ROI (CENTERED ONLY)
    ========================= */
    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      border: 2px solid lime;
      border-radius: 10px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      transform: translate(-50%, -50%);
      touch-action: none;
    }

    /* BIG HANDLE */
    #handle {
      position: absolute;
      width: 30px;
      height: 30px;
      right: -15px;
      bottom: -15px;
      background: lime;
      border-radius: 50%;
      touch-action: none;
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    #name {
      position: fixed;
      bottom: 50px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    .ok { color: lime; }
    .bad { color: red; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="roi">
  <div id="handle"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<div id="status">Starting...</div>
<div id="name"></div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

/* =========================
   ENGINE ABSTRACTION
========================= */

const Engine = {
  ZXING: "zxing_js",
  WASM: "wasm_placeholder"
};

let currentEngine = Engine.ZXING;

/* =========================
   ROI STATE (CENTER + SIZE ONLY)
========================= */

let roiState = {
  w: 300,
  h: 180
};

const roi = document.getElementById("roi");
const handle = document.getElementById("handle");

/* =========================
   APPLY ROI STYLE
========================= */

function renderROI() {
  roi.style.width = roiState.w + "px";
  roi.style.height = roiState.h + "px";
}

renderROI();

/* =========================
   RESIZE (FIXED, SIMPLE, STABLE)
========================= */

let resizing = false;
let startX = 0;
let startY = 0;
let startW = 0;
let startH = 0;

handle.addEventListener("pointerdown", (e) => {
  resizing = true;
  handle.setPointerCapture(e.pointerId);

  startX = e.clientX;
  startY = e.clientY;

  startW = roiState.w;
  startH = roiState.h;
});

window.addEventListener("pointermove", (e) => {

  if (!resizing) return;

  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  roiState.w = Math.max(120, startW + dx);
  roiState.h = Math.max(80, startH + dy);

  renderROI();
});

window.addEventListener("pointerup", () => {
  resizing = false;
});

/* =========================
   PARSER
========================= */

function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: p[4] || "",
    apellido: p[1] || "",
    nombre: p[2] || ""
  };
}

/* =========================
   ZXING ENGINE (CURRENT)
========================= */

let codeReader;
let scanning = true;
let lastScan = 0;

/* =========================
   CAMERA + SCAN LOOP
========================= */

async function start() {

  const video = document.getElementById("video");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    }
  });

  video.srcObject = stream;
  await video.play();

  codeReader = new ZXingBrowser.BrowserMultiFormatReader();

  document.getElementById("status").textContent = "Scanning...";

  setInterval(() => {

    if (!scanning) return;

    const now = Date.now();
    if (now - lastScan < 400) return;
    lastScan = now;

    codeReader.decodeFromVideoDevice(null, video, (result) => {

      if (!result || !scanning) return;

      scanning = false;

      const data = parseDNI(result.getText());

      send(data);

      setTimeout(() => scanning = true, 1200);
    });

  }, 150);
}

/* =========================
   BACKEND
========================= */

function send(data) {

  document.getElementById("status").textContent = "Processing...";

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "text/plain"
    }
  })
  .then(r => r.json())
  .then(show)
  .catch(e => {
    document.getElementById("status").textContent = e.toString();
  });
}

/* =========================
   UI
========================= */

function show(res) {

  if (res.status === "OK") {

    document.getElementById("status").className = "ok";
    document.getElementById("status").textContent = "OK";

    document.getElementById("name").textContent =
      res.nombre + " " + res.apellido;

  } else {

    document.getElementById("status").className = "bad";
    document.getElementById("status").textContent = "NOT FOUND";

    document.getElementById("name").textContent = "";
  }
}

/* =========================
   ENGINE SWITCH (READY FOR WASM)
========================= */

function switchEngine(newEngine) {
  currentEngine = newEngine;

  if (newEngine === Engine.WASM) {
    console.log("WASM engine not plugged yet");
  }
}

/* =========================
   INIT
========================= */

start();

</script>

</body>
</html>
