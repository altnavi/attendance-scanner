<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scanner</title>

  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 360px;
      transform: translate(-50%, -50%);
      border: 2px solid lime;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      border-radius: 10px;
      pointer-events: none;
    }

    #canvas {
      display: none;
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 1px 1px 2px black;
    }

    #name {
      position: fixed;
      bottom: 50px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 1px 1px 2px black;
    }

    .ok { color: lime !important; }
    .bad { color: red !important; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="roi"></div>

<canvas id="canvas"></canvas>

<div id="status">Starting...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

/* =========================
   STATE
========================= */

let reader;
let scanning = true;

/* =========================
   ELEMENTS (CACHE ONCE)
========================= */

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const roiEl = document.getElementById("roi");

const statusEl = document.getElementById("status");
const nameEl = document.getElementById("name");

/* =========================
   STATUS
========================= */

function setStatus(t, cls="") {
  statusEl.textContent = t;
  statusEl.className = cls;
}

/* =========================
   PARSE PDF417
========================= */

function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: (p[4] || "").trim(),
    apellido: (p[1] || "").trim(),
    nombre: (p[2] || "").trim()
  };
}

/* =========================
   ROI CROP (FIXED)
========================= */

function getCrop() {
  const rect = video.getBoundingClientRect();
  const roi = roiEl.getBoundingClientRect();

  const scaleX = video.videoWidth / rect.width;
  const scaleY = video.videoHeight / rect.height;

  const sx = (roi.left - rect.left) * scaleX;
  const sy = (roi.top - rect.top) * scaleY;
  const sw = roi.width * scaleX;
  const sh = roi.height * scaleY;

  return { sx, sy, sw, sh };
}

/* =========================
   CAPTURE FRAME
========================= */

function capture() {
  const { sx, sy, sw, sh } = getCrop();

  const DOWNSCALE = 1.0;

  canvas.width = sw * DOWNSCALE;
  canvas.height = sh * DOWNSCALE;

  ctx.drawImage(
    video,
    sx, sy, sw, sh,
    0, 0,
    canvas.width,
    canvas.height
  );

  return canvas;
}

/* =========================
   SEND
========================= */

function send(data) {
  setStatus("Processing...");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain" }
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === "OK") {
      setStatus("OK", "ok");
      nameEl.textContent = res.nombre + " " + res.apellido;
    } else {
      setStatus("NOT FOUND", "bad");
      nameEl.textContent = "";
    }

    // Reactivate scanner and kickstart the loop again
    scanning = true;
    loop();
  })
  .catch(e => {
    setStatus(e.toString(), "bad");
    scanning = true;
    loop();
  });
}

/* =========================
   SCAN LOOP (STABLE ASYNC)
========================= */

function loop() {
  if (!scanning) return;

  // Wait if the camera stream elements haven't initialized layout sizes yet
  if (video.videoWidth === 0 || video.videoHeight === 0) {
    requestAnimationFrame(loop);
    return;
  }

  try {
    const croppedCanvas = capture();

    reader.decodeFromCanvas(croppedCanvas)
      .then(result => {
        scanning = false; // Immediately stop further loop triggers
        const data = parseDNI(result.getText());
        send(data);
      })
      .catch(() => {
        // No barcode detected in this frame.
        // Wait 150ms before grabbing the next one to minimize CPU thrashing.
        if (scanning) {
          setTimeout(loop, 150);
        }
      });

  } catch (e) {
    console.error(e);
    // If a hard failure happens, try to recover after 1 second
    if (scanning) {
      setTimeout(loop, 1000);
    }
  }
}

/* =========================
   START
========================= */

async function start() {
  setStatus("Starting camera...");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });

    video.srcObject = stream;
    await video.play();

    reader = new ZXing.BrowserMultiFormatReader();

    setStatus("Scanning...");
    loop();

  } catch (err) {
    console.error(err);
    setStatus("Camera error: " + err.message, "bad");
  }
}

start();

</script>

</body>
</html>
