<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DNI Scanner Fixed</title>

  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 500px;
      height: 140px;
      transform: translate(-50%, -50%);
      border: 3px solid lime;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
      border-radius: 8px;
      pointer-events: none;
    }

    /* Set to absolute and a small size to preview what the reader actually sees */
    #canvas {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 150px;
      height: auto;
      z-index: 999;
      border: 1px solid white;
      background: #222;
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 18px;
    }

    #name {
      position: fixed;
      bottom: 60px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 20px;
    }

    .ok { color: lime !important; }
    .bad { color: red !important; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="roi"></div>

<canvas id="canvas"></canvas>

<div id="status">Starting camera...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

/* =========================
   STATE & CORES
========================= */
let reader;
let isProcessingFrame = false; // STOPS OVERLAP DECODING completely
let scanning = true;

/* =========================
   ELEMENTS
========================= */
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const roiEl = document.getElementById("roi");
const statusEl = document.getElementById("status");
const nameEl = document.getElementById("name");

function setStatus(t, cls="") {
  statusEl.textContent = t;
  statusEl.className = cls;
}

function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: (p[4] || "").trim(),
    apellido: (p[1] || "").trim(),
    nombre: (p[2] || "").trim()
  };
}

function getCrop() {
  const rect = video.getBoundingClientRect();
  const roi = roiEl.getBoundingClientRect();

  const scaleX = video.videoWidth / rect.width;
  const scaleY = video.videoHeight / rect.height;

  const sx = (roi.left - rect.left) * scaleX;
  const sy = (roi.top - rect.top) * scaleY;
  const sw = roi.width * scaleX;
  const sh = roi.height * scaleY;

  return { sx, sy, sw, sh };
}

/* =========================
   CAPTURE WITH MANUAL BINARIZATION
========================= */
function capture() {
  const { sx, sy, sw, sh } = getCrop();

  if(sw <= 0 || sh <= 0) return false;

  canvas.width = sw;
  canvas.height = sh;

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

  // Manual High-Contrast Grayscale (Fallback for browsers ignoring ctx.filter)
  try {
    const imgData = ctx.getImageData(0, 0, sw, sh);
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
      // Standard luminance weights
      let gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
      
      // Dynamic Threshold Contrast Maximization
      gray = gray > 120 ? 255 : 0; 
      
      data[i]     = gray; // R
      data[i + 1] = gray; // G
      data[i + 2] = gray; // B
    }
    ctx.putImageData(imgData, 0, 0);
  } catch(e) {
    console.warn("Luminance patch skipped:", e);
  }

  return true;
}

/* =========================
   SEND POST
========================= */
function send(data) {
  setStatus("Processing API...");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain" }
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === "OK") {
      setStatus("OK", "ok");
      nameEl.textContent = res.nombre + " " + res.apellido;
    } else {
      setStatus("NOT FOUND", "bad");
      nameEl.textContent = "";
    }
    
    setTimeout(() => {
      scanning = true;
      isProcessingFrame = false;
      setStatus("Scanning...");
      loop();
    }, 3000);
  })
  .catch(e => {
    setStatus("Error: " + e.toString(), "bad");
    setTimeout(() => {
      scanning = true;
      isProcessingFrame = false;
      setStatus("Scanning...");
      loop();
    }, 3000);
  });
}

/* =========================
   STABLE SEQUENTIAL LOOP
========================= */
async function loop() {
  if (!scanning || isProcessingFrame) return;

  if (video.videoWidth === 0 || video.videoHeight === 0) {
    requestAnimationFrame(loop);
    return;
  }

  // Set the concurrency block lock immediately
  isProcessingFrame = true;

  const dynamicCaptureSuccess = capture();
  
  if (!dynamicCaptureSuccess) {
    isProcessingFrame = false;
    requestAnimationFrame(loop);
    return;
  }

  try {
    // Explicitly using decodeFromCanvas to ensure state cleanly isolates
    const result = await reader.decodeFromCanvas(canvas);
    
    // IF WE REACH HERE: Barcode found successfully!
    scanning = false; 
    const data = parseDNI(result.getText());
    send(data);

  } catch (error) {
    // No barcode discovered in this frame matrix. 
    // Release the lock and call next sequence via safe delay interval
    isProcessingFrame = false;
    if (scanning) {
      setTimeout(loop, 200); 
    }
  }
}

/* =========================
   INITIALIZE & CONFIGURE
========================= */
async function start() {
  setStatus("Starting camera...");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920, min: 1280 },
        height: { ideal: 1080, min: 720 }
      }
    });

    video.srcObject = stream;
    await video.play();

    // Strict decoding configuration parameters map
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.PDF_417]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    reader = new ZXing.BrowserMultiFormatReader(hints);

    setStatus("Scanning...");
    loop();

  } catch (err) {
    console.error(err);
    setStatus("Camera error: " + err.message, "bad");
  }
}

start();

</script>

</body>
</html>
