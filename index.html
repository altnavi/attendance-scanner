<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Attendance Scanner</title>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@latest/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* ===== ROI BOX ===== */
    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 280px;
      height: 160px;
      transform: translate(-50%, -50%);
      border: 2px solid lime;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      border-radius: 10px;
      cursor: move;
      touch-action: none;
    }

    /* resize handle */
    #handle {
      position: absolute;
      width: 14px;
      height: 14px;
      right: -7px;
      bottom: -7px;
      background: lime;
      border-radius: 50%;
      cursor: nwse-resize;
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    #name {
      position: fixed;
      bottom: 50px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="roi">
  <div id="handle"></div>
</div>

<div id="status">Starting...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

let codeReader;
let scanning = true;

/* =========================
   ROI STATE (normalized)
========================= */

let roi = {
  x: 0.5,
  y: 0.5,
  w: 0.3,
  h: 0.25
};

/* =========================
   ROI ELEMENTS
========================= */

const roiEl = document.getElementById("roi");
const handle = document.getElementById("handle");

/* =========================
   DRAG BOX
========================= */

let dragging = false;
let resizing = false;
let startX, startY, startW, startH, startLeft, startTop;

roiEl.addEventListener("pointerdown", (e) => {
  if (e.target === handle) return;

  dragging = true;
  startX = e.clientX;
  startY = e.clientY;

  const rect = roiEl.getBoundingClientRect();
  startLeft = rect.left;
  startTop = rect.top;
});

handle.addEventListener("pointerdown", (e) => {
  resizing = true;
  startX = e.clientX;
  startY = e.clientY;

  const rect = roiEl.getBoundingClientRect();
  startW = rect.width;
  startH = rect.height;

  e.stopPropagation();
});

window.addEventListener("pointermove", (e) => {

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const rect = roiEl.getBoundingClientRect();

  if (dragging) {

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    roiEl.style.left = (startLeft + dx + rect.width / 2) + "px";
    roiEl.style.top = (startTop + dy + rect.height / 2) + "px";

    updateROI();
  }

  if (resizing) {

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    roiEl.style.width = Math.max(100, startW + dx) + "px";
    roiEl.style.height = Math.max(80, startH + dy) + "px";

    updateROI();
  }
});

window.addEventListener("pointerup", () => {
  dragging = false;
  resizing = false;
});

/* =========================
   UPDATE ROI NORMALIZED
========================= */

function updateROI() {

  const rect = roiEl.getBoundingClientRect();

  roi = {
    x: (rect.left + rect.width / 2) / window.innerWidth,
    y: (rect.top + rect.height / 2) / window.innerHeight,
    w: rect.width / window.innerWidth,
    h: rect.height / window.innerHeight
  };

  console.log("ROI:", roi);
}

/* =========================
   START CAMERA + ZXING
========================= */

async function start() {

  const video = document.getElementById("video");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    }
  });

  video.srcObject = stream;
  await video.play();

  codeReader = new ZXingBrowser.BrowserMultiFormatReader();

  document.getElementById("status").textContent = "Scanning...";

  codeReader.decodeFromVideoDevice(
    null,
    video,
    (result) => {

      if (result && scanning) {

        scanning = false;

        document.getElementById("status").textContent =
          "Detected (ROI not applied yet)";

        setTimeout(() => scanning = true, 1200);
      }

    }
  );
}

start();

</script>

</body>
</html>
