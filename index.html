<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DNI Decoder Standard - Core Engine</title>

  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 500px;
      height: 150px;
      transform: translate(-50%, -50%);
      border: 3px solid lime;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      border-radius: 8px;
      pointer-events: none;
    }

    #canvas {
      display: none; 
    }

    #debugCanvas {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 220px;
      border: 2px solid yellow;
      background: black;
      z-index: 9999;
    }
    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 18px;
    }

    #name {
      position: fixed;
      bottom: 60px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 20px;
    }

    .ok { color: lime !important; }
    .bad { color: red !important; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="roi"></div>

<canvas id="canvas"></canvas>
<canvas id="debugCanvas"></canvas>

<div id="status">Starting Engine...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

/* =========================
   STATE
========================= */
let reader;
let isProcessingFrame = false;
let scanning = true;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const debugCanvas = document.getElementById("debugCanvas");
const debugCtx = debugCanvas.getContext("2d");
const roiEl = document.getElementById("roi");
const statusEl = document.getElementById("status");
const nameEl = document.getElementById("name");

function setStatus(t, cls="") {
  statusEl.textContent = t;
  statusEl.className = cls;
}

function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: (p[4] || "").trim(),
    apellido: (p[1] || "").trim(),
    nombre: (p[2] || "").trim()
  };
}

/* =========================
   CROP MATH (OBJECT-FIT COVER PROOF)
========================= */
function getCropCoordinates() {
  const videoWidth = video.videoWidth;
  const videoHeight = video.videoHeight;
  const rect = video.getBoundingClientRect();

  const videoRatio = videoWidth / videoHeight;
  const elementRatio = rect.width / rect.height;

  let scale, implicitWidth, implicitHeight;

  if (elementRatio > videoRatio) {
    scale = rect.width / videoWidth;
    implicitWidth = rect.width;
    implicitHeight = rect.width / videoRatio;
  } else {
    scale = rect.height / videoHeight;
    implicitWidth = rect.height * videoRatio;
    implicitHeight = rect.height;
  }

  const videoLeft = rect.left + (rect.width - implicitWidth) / 2;
  const videoTop = rect.top + (rect.height - implicitHeight) / 2;
  const roi = roiEl.getBoundingClientRect();

  return {
    sx: (roi.left - videoLeft) / scale,
    sy: (roi.top - videoTop) / scale,
    sw: roi.width / scale,
    sh: roi.height / scale
  };
}

/* =========================
   CAPTURE AND RESCALE IMAGE
========================= */
function processAndCaptureFrame() {

  const { sx, sy, sw, sh } = getCropCoordinates();

  if (sw <= 0 || sh <= 0 || isNaN(sx) || isNaN(sy))
    return false;

  canvas.width = Math.round(sw);
  canvas.height = Math.round(sh);

  ctx.imageSmoothingEnabled = false;
  ctx.filter = "none";

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.drawImage(
    video,
    sx, sy, sw, sh,
    0, 0, canvas.width, canvas.height
  );

  debugCanvas.width = canvas.width;
  debugCanvas.height = canvas.height;

  debugCtx.imageSmoothingEnabled = false;
  debugCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
  debugCtx.drawImage(canvas, 0, 0);

  return true;
}

/* =========================
   LOW-LEVEL CORE ENGINE DECODE LOOP
========================= */
function loop() {
  if (!scanning || isProcessingFrame) return;

  if (video.videoWidth === 0 || video.videoHeight === 0) {
    requestAnimationFrame(loop);
    return;
  }

  isProcessingFrame = true;

  if (!processAndCaptureFrame()) {
    isProcessingFrame = false;
    requestAnimationFrame(loop);
    return;
  }

  try {
    // 1. Get raw pixel RGBA matrix array data from the high-res canvas
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    
    // 2. Wrap it directly into low-level ZXing memory classes
    const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
    const binarizer = new ZXing.HybridBinarizer(luminanceSource);
    const bitmap = new ZXing.BinaryBitmap(binarizer);

    // 3. Directly invoke core decode method (universal across all library builds)
    const result = reader.decode(bitmap);

    scanning = false;
    const data = parseDNI(result.getText());
    send(data);

  } catch(err) {
      lastError = err.name || err.constructor.name;
      lastMessage = err.message || "";

      isProcessingFrame = false;

      if(scanning)
          setTimeout(loop,120);
  }
}

/* =========================
   INITIALIZATION
========================= */
async function start() {
  setStatus("Starting Camera...");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920, min: 1280 },
        height: { ideal: 1080, min: 720 }
      }
    });

    video.srcObject = stream;
    await video.play();

    // Setup pure base engine MultiFormatReader object instance
    reader = new ZXing.MultiFormatReader();

    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.PDF_417]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    
    reader.setHints(hints);

    setStatus("Scanning...");
    loop();

  } catch (err) {
    console.error(err);
    setStatus("Camera initialization failed: " + err.message, "bad");
  }
}

start();

</script>

</body>
</html>
