<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DNI Scanner - Full Frame</title>

  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* Guided target line just to help the user align the card horizontally */
    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 80vw;
      height: 2px;
      background: lime;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px lime;
      pointer-events: none;
    }

    /* Small live preview of the raw processed data stream being analyzed */
    #canvas {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 160px;
      height: auto;
      z-index: 999;
      border: 1px solid white;
      background: #222;
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 18px;
    }

    #name {
      position: fixed;
      bottom: 60px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 20px;
    }

    .ok { color: lime !important; }
    .bad { color: red !important; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="roi"></div>

<canvas id="canvas"></canvas>

<div id="status">Starting camera...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

/* =========================
   STATE & CORES
========================= */
let reader;
let isProcessingFrame = false; 
let scanning = true;

/* =========================
   ELEMENTS
========================= */
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusEl = document.getElementById("status");
const nameEl = document.getElementById("name");

function setStatus(t, cls="") {
  statusEl.textContent = t;
  statusEl.className = cls;
}

function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: (p[4] || "").trim(),
    apellido: (p[1] || "").trim(),
    nombre: (p[2] || "").trim()
  };
}

/* =========================
   CAPTURE FULL FRAME (NO CROP)
========================= */
function capture() {
  const w = video.videoWidth;
  const h = video.videoHeight;

  if (w === 0 || h === 0) return false;

  // Canvas size perfectly mirrors the high-res camera stream dimensions
  canvas.width = w;
  canvas.height = h;

  // Apply light image normalization directly to native engine layer
  ctx.filter = "contrast(1.2) grayscale(1)";

  // Draw the absolute entire camera frame onto the workspace
  ctx.drawImage(video, 0, 0, w, h);

  return true;
}

/* =========================
   SEND POST
========================= */
function send(data) {
  setStatus("Processing API...");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain" }
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === "OK") {
      setStatus("OK", "ok");
      nameEl.textContent = res.nombre + " " + res.apellido;
    } else {
      setStatus("NOT FOUND", "bad");
      nameEl.textContent = "";
    }
    
    setTimeout(() => {
      scanning = true;
      isProcessingFrame = false;
      setStatus("Scanning...");
      loop();
    }, 3000);
  })
  .catch(e => {
    setStatus("Error: " + e.toString(), "bad");
    setTimeout(() => {
      scanning = true;
      isProcessingFrame = false;
      setStatus("Scanning...");
      loop();
    }, 3000);
  });
}

/* =========================
   SEQUENTIAL SCAN LOOP
========================= */
async function loop() {
  if (!scanning || isProcessingFrame) return;

  if (video.videoWidth === 0 || video.videoHeight === 0) {
    requestAnimationFrame(loop);
    return;
  }

  isProcessingFrame = true;

  if (!capture()) {
    isProcessingFrame = false;
    requestAnimationFrame(loop);
    return;
  }

  try {
    // Read directly from full frame snapshot
    const result = await reader.decodeFromCanvas(canvas);
    
    scanning = false; 
    const data = parseDNI(result.getText());
    send(data);

  } catch (error) {
    // Release execution block to cycle next frame asynchronously
    isProcessingFrame = false;
    if (scanning) {
      setTimeout(loop, 100); 
    }
  }
}

/* =========================
   INITIALIZE & CONFIGURE
========================= */
async function start() {
  setStatus("Starting camera...");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920, min: 1280 },
        height: { ideal: 1080, min: 720 }
      }
    });

    video.srcObject = stream;
    await video.play();

    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.PDF_417]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    reader = new ZXing.BrowserMultiFormatReader(hints);

    setStatus("Scanning...");
    loop();

  } catch (err) {
    console.error(err);
    setStatus("Camera error: " + err.message, "bad");
  }
}

start();

</script>

</body>
</html>
