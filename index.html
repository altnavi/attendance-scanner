<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scanner</title>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@latest/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 360px;
      transform: translate(-50%, -50%);
      border: 2px solid lime;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      border-radius: 10px;
      pointer-events: none;
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    #name {
      position: fixed;
      bottom: 50px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    .ok { color: lime; }
    .bad { color: red; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="roi"></div>

<canvas id="canvas" style="display:none;"></canvas>

<div id="status">Starting...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

let codeReader;
let scanning = false;
let lastScan = 0;

/* =========================
   DEBUG STATUS
========================= */

function setStatus(msg, cls="") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = cls;
  console.log("[STATUS]", msg);
}

/* =========================
   PARSER
========================= */

function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: p[4] || "",
    apellido: p[1] || "",
    nombre: p[2] || ""
  };
}

/* =========================
   ROI CROP + DOWNSCALE
========================= */

function captureROI(video) {

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const roi = document.getElementById("roi").getBoundingClientRect();

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const scaleX = vw / window.innerWidth;
  const scaleY = vh / window.innerHeight;

  const sx = roi.left * scaleX;
  const sy = roi.top * scaleY;
  const sw = roi.width * scaleX;
  const sh = roi.height * scaleY;

  const DOWNSCALE = 0.8; // safer for PDF417

  const dw = sw * DOWNSCALE;
  const dh = sh * DOWNSCALE;

  canvas.width = dw;
  canvas.height = dh;

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, dw, dh);

  return canvas;
}

/* =========================
   START CAMERA (ROBUST)
========================= */

async function start() {

  try {

    setStatus("Requesting camera...");

    const video = document.getElementById("video");

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });

    setStatus("Camera OK");

    video.srcObject = stream;
    await video.play();

    setStatus("Initializing decoder...");

    codeReader = new ZXingBrowser.BrowserMultiFormatReader();

    setStatus("Scanner ready");

    scanning = true;

    runLoop(video);

  } catch (err) {

    setStatus(err.name + ": " + err.message, "bad");
    console.error(err);
  }
}

/* =========================
   SCAN LOOP (FORCED START)
========================= */

function runLoop(video) {

  setStatus("Scanning...");

  setInterval(() => {

    if (!scanning) return;

    const now = Date.now();
    if (now - lastScan < 500) return;
    lastScan = now;

    const canvas = captureROI(video);

    try {

      codeReader.decodeFromCanvas(canvas)
        .then(result => {

          scanning = false;

          const data = parseDNI(result.getText());

          send(data);

          setTimeout(() => scanning = true, 1200);

        })
        .catch(() => {
          // ignore no-detect frames
        });

    } catch (e) {
      console.error("decode crash", e);
    }

  }, 120);
}

/* =========================
   BACKEND
========================= */

function send(data) {

  setStatus("Processing...");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "text/plain"
    }
  })
  .then(r => r.json())
  .then(res => {

    if (res.status === "OK") {
      setStatus("OK", "ok");
      document.getElementById("name").textContent =
        res.nombre + " " + res.apellido;
    } else {
      setStatus("NOT FOUND", "bad");
      document.getElementById("name").textContent = "";
    }

  })
  .catch(e => setStatus(e.toString(), "bad"));
}

/* =========================
   INIT
========================= */

start();

</script>

</body>
</html>
