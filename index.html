<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>DNI Scanner</title>

  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #roi {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 500px;
      height: 150px;
      transform: translate(-50%, -50%);
      border: 3px solid lime;
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, .55);
      pointer-events: none;
    }

    #canvas {
      display: none;
    }

    #debugCanvas {
      position: fixed;
      right: 10px;
      top: 10px;
      width: 220px;
      border: 2px solid yellow;
      background: black;
    }

    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 250px;
      background: rgba(0, 0, 0, .65);
      color: white;
      padding: 8px;
      border-radius: 6px;
      font-family: monospace;
      white-space: pre-wrap;
    }

    #name {
      position: fixed;
      bottom: 50px;
      width: 100%;
      text-align: center;
      color: white;
      font: bold 20px Arial;
    }

    .ok {
      color: lime;
    }

    .bad {
      color: red;
    }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline></video>

  <div id="roi"></div>

  <canvas id="canvas"></canvas>
  <canvas id="debugCanvas"></canvas>

  <div id="status"></div>
  <div id="name"></div>

  <script>

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

    let reader;

    let decodeCount = 0;
    let lastError = "";
    let lastMessage = "";
    let scanning = true;

    const video = document.getElementById("video");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.imageSmoothingEnabled = false;

    const debugCanvas = document.getElementById("debugCanvas");
    const debugCtx = debugCanvas.getContext("2d");
    debugCtx.imageSmoothingEnabled = false;

    const statusEl = document.getElementById("status");
    const nameEl = document.getElementById("name");

    function status(text) {

      statusEl.textContent =
        `Status : ${text}
Frames : ${decodeCount}
Error  : ${lastError}
Message: ${lastMessage}`;

    }

    function parseDNI(raw) {

      const p = raw.split("@");

      return {

        dni: p[4]?.trim() || "",
        apellido: p[1]?.trim() || "",
        nombre: p[2]?.trim() || ""

      };

    }

    function allocateCanvases() {

      if (canvas.width === video.videoWidth)
        return;

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      debugCanvas.width = 220;
      debugCanvas.height = Math.round(
        220 * video.videoHeight / video.videoWidth);

    }

    function loop() {

      if (!scanning)
        return;

      if (!video.videoWidth) {

        setTimeout(loop, 100);
        return;

      }

      allocateCanvases();

      ctx.drawImage(video, 0, 0);

      debugCtx.drawImage(
        canvas,
        0,
        0,
        debugCanvas.width,
        debugCanvas.height
      );

      try {

        lastError = "";
        lastMessage = "";

        const luminance = new ZXing.HTMLCanvasElementLuminanceSource(canvas);

        const bitmap = new ZXing.BinaryBitmap(
          new ZXing.HybridBinarizer(luminance)
        );

        decodeCount++;

        if (decodeCount % 10 === 0)
          status("Scanning...");

        const result = reader.decode(bitmap);

        scanning = false;

        const raw = result.getText();

        const data = parseDNI(raw);
        data.raw = raw;

        send(data);

      }
      catch (err) {

        lastError = err.name || "";
        lastMessage = err.message || "";

        setTimeout(loop, 120);

      }

    }

    async function send(data) {

      setStatus("Sending...");

      try {

        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        lastError = "";
        lastMessage = "";

        if (result.status === "OK") {

          nameEl.textContent =
            result.nombre + " " + result.apellido;

          setStatus("Attendance recorded", "ok");

        } else {

          nameEl.textContent = "";

          lastError = result.status;
          lastMessage = result.message || "";

          setStatus(result.status, "bad");
        }

      } catch (err) {

        lastError = err.name;
        lastMessage = err.message;

        setStatus("Network error", "bad");
      }

      scanning = true;

      setTimeout(loop, 1000);
    }

    async function start() {

      status("Starting camera...");

      const stream = await navigator.mediaDevices.getUserMedia({

        video: {
          facingMode: "environment",
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }

      });

      video.srcObject = stream;

      await video.play();

      reader = new ZXing.MultiFormatReader();

      const hints = new Map();

      hints.set(
        ZXing.DecodeHintType.POSSIBLE_FORMATS,
        [ZXing.BarcodeFormat.PDF_417]
      );

      hints.set(
        ZXing.DecodeHintType.TRY_HARDER,
        true
      );

      reader.setHints(hints);

      status("Scanning...");

      loop();

    }

    start();

  </script>

</body>

</html>
