<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DNI Scanner - Production Engine</title>

  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #roi {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 80vw;
      height: 160px;
      transform: translate(-50%, -50%);
      border: 3px solid lime;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      border-radius: 8px;
      pointer-events: none;
    }

    #status {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 18px;
    }

    #name {
      position: fixed;
      bottom: 60px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-shadow: 2px 2px 3px black;
      font-size: 20px;
    }

    .ok { color: lime !important; }
    .bad { color: red !important; }
  </style>
</head>

<body>

<video id="video" playsinline></video>
<div id="roi"></div>

<div id="status">Initializing Engine...</div>
<div id="name"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

let reader;
const video = document.getElementById("video");
const statusEl = document.getElementById("status");
const nameEl = document.getElementById("name");

function setStatus(t, cls="") {
  statusEl.textContent = t;
  statusEl.className = cls;
}

function parseDNI(raw) {
  const p = raw.split("@");
  return {
    dni: (p[4] || "").trim(),
    apellido: (p[1] || "").trim(),
    nombre: (p[2] || "").trim()
  };
}

/* =========================
   SEND POST
========================= */
function send(data) {
  setStatus("Processing API...");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain" }
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === "OK") {
      setStatus("OK", "ok");
      nameEl.textContent = res.nombre + " " + res.apellido;
    } else {
      setStatus("NOT FOUND", "bad");
      nameEl.textContent = "";
    }
    
    setTimeout(() => {
      setStatus("Scanning...");
      startScanner();
    }, 4000);
  })
  .catch(e => {
    setStatus("Error: " + e.toString(), "bad");
    setTimeout(() => {
      setStatus("Scanning...");
      startScanner();
    }, 4000);
  });
}

/* =========================
   STREAM PROCESSING PIPELINE
========================= */
function startScanner() {
  const constraints = {
    audio: false,
    video: {
      facingMode: "environment",
      width: { ideal: 1920, min: 1280 },
      height: { ideal: 1080, min: 720 }
    }
  };

  // decodeFromConstraints maps constraints, targeted video element, and continuous frame outputs natively
  reader.decodeFromConstraints(constraints, video, (result, error) => {
    if (result) {
      reader.reset(); // Disconnect pipeline temporarily to hold layout focus
      setStatus("Code Found!");
      
      const data = parseDNI(result.getText());
      send(data);
    }

    if (error && !(error instanceof ZXing.NotFoundException)) {
      console.error("Hardware pipeline error:", error);
    }
  });
}

/* =========================
   INITIALIZATION
========================= */
function init() {
  try {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.PDF_417]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    reader = new ZXing.BrowserMultiFormatReader(hints);

    setStatus("Scanning...");
    startScanner();

  } catch (err) {
    console.error(err);
    setStatus("Initialization error: " + err.message, "bad");
  }
}

// Fire runtime setup execution
init();

</script>

</body>
</html>
