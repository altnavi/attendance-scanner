<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>DNI Scanner</title>

  <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #video {
      position: fixed;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #roi {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 450px;
      height: 160px;
      transform: translate(-50%, -50%);
      border: 3px solid lime;
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, .55);
      pointer-events: none;
    }

    #canvas {
      display: none;
    }

    #debugCanvas {
      position: fixed;
      right: 10px;
      top: 10px;
      width: 220px;
      border: 2px solid yellow;
      background: black;
    }

    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 250px;
      background: rgba(0, 0, 0, .65);
      color: white;
      padding: 8px;
      border-radius: 6px;
      font-family: monospace;
      white-space: pre-wrap;
    }

    #name {
      position: fixed;
      bottom: 50px;
      width: 100%;
      text-align: center;
      color: white;
      font: bold 20px Arial;
    }

    .ok {
      color: lime;
    }

    .bad {
      color: red;
    }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline></video>

  <div id="roi"></div>

  <canvas id="canvas"></canvas>
  <canvas id="debugCanvas"></canvas>

  <div id="status"></div>
  <div id="name"></div>

  <script>

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

    let pdfReader;

    let decodeCount = 0;
    let lastError = "";
    let lastMessage = "";
    let scanning = true;

    const video = document.getElementById("video");
    const roi = document.getElementById("roi");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.imageSmoothingEnabled = false;

    const debugCanvas = document.getElementById("debugCanvas");
    const debugCtx = debugCanvas.getContext("2d");
    debugCtx.imageSmoothingEnabled = false;

    const statusEl = document.getElementById("status");
    const nameEl = document.getElementById("name");

    function setStatus(text, cssClass = "") {
      statusEl.className = cssClass;
      statusEl.textContent =
        `Status : ${text}
Frames : ${decodeCount}
Error  : ${lastError}
Message: ${lastMessage}`;
    }

    function parseDNI(raw) {
      const p = raw.split("@");
      // Argentine DNI PDF417 format mapping
      return {
        dni: p[4]?.trim() || p[1]?.trim() || "",
        apellido: p[1]?.trim() || "",
        nombre: p[2]?.trim() || ""
      };
    }

    // Crops the section of video visible inside the green ROI overlay onto the canvas
    function captureROI() {
      const vWidth = video.videoWidth;
      const vHeight = video.videoHeight;

      if (!vWidth || !vHeight) return false;

      const roiRect = roi.getBoundingClientRect();
      const videoRect = video.getBoundingClientRect();

      // Calculate scale ratio between object-fit video and real camera feed resolution
      const scaleX = vWidth / videoRect.width;
      const scaleY = vHeight / videoRect.height;

      const cropX = Math.max(0, (roiRect.left - videoRect.left) * scaleX);
      const cropY = Math.max(0, (roiRect.top - videoRect.top) * scaleY);
      const cropWidth = Math.min(vWidth - cropX, roiRect.width * scaleX);
      const cropHeight = Math.min(vHeight - cropY, roiRect.height * scaleY);

      canvas.width = cropWidth;
      canvas.height = cropHeight;

      ctx.drawImage(
        video,
        cropX, cropY, cropWidth, cropHeight,
        0, 0, cropWidth, cropHeight
      );

      // Render debug thumbnail in top-right
      debugCanvas.width = 220;
      debugCanvas.height = Math.round(220 * (cropHeight / cropWidth));
      debugCtx.drawImage(canvas, 0, 0, debugCanvas.width, debugCanvas.height);

      return true;
    }

    async function loop() {
      if (!scanning) return;

      try {
        if (!captureROI()) {
          setTimeout(loop, 100);
          return;
        }

        decodeCount++;
        setStatus("Decoding...");

        // Convert canvas pixels to ZXing BinaryBitmap
        const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
        const hybridBinarizer = new ZXing.HybridBinarizer(luminanceSource);
        const bitmap = new ZXing.BinaryBitmap(hybridBinarizer);

        // Perform PDF417 decode directly on bitmap
        const result = pdfReader.decode(bitmap);

        scanning = false;
        const raw = result.getText();
        const data = parseDNI(raw);
        data.raw = raw;

        setStatus("Decoded successfully!", "ok");
        send(data);
        return;

      } catch (err) {
        // ZXing throws NotFoundException / ChecksumException when no barcode is in frame
        if (err.name === "NotFoundException" || err.name === "ChecksumException" || err.name === "FormatException") {
          lastError = "Scanning...";
          lastMessage = "No PDF417 detected in ROI";
        } else {
          lastError = err.name || "Error";
          lastMessage = err.message || err;
        }
      }

      setTimeout(loop, 120);
    }

    async function send(data) {
      setStatus("Sending to Google Sheet...");

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.status === "OK") {
          nameEl.textContent = (result.nombre || data.nombre) + " " + (result.apellido || data.apellido);
          setStatus("Attendance recorded", "ok");
        } else {
          nameEl.textContent = "";
          lastError = result.status;
          lastMessage = result.message || "";
          setStatus(result.status, "bad");
        }

      } catch (err) {
        lastError = err.name || "Error";
        lastMessage = err.message || "";
        setStatus("Network error", "bad");
      }

      // Pause briefly before resuming scanning
      setTimeout(() => {
        scanning = true;
        loop();
      }, 2500);
    }

    async function start() {
      setStatus("Starting camera...");

      try {
        // Initialize core PDF417 reader instance
        pdfReader = new ZXing.PDF417Reader();

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }
        });

        video.srcObject = stream;
        await video.play();

        setStatus("Scanning...");
        loop();
      } catch (err) {
        lastError = err.name;
        lastMessage = err.message;
        setStatus("Camera error", "bad");
      }
    }

    start();

  </script>

</body>

</html>
