<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Attendance Scanner</title>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@latest/umd/index.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 20px;
    }

    video {
      width: 90%;
      max-width: 500px;
      border: 1px solid #ccc;
    }

    .ok { color: green; }
    .bad { color: red; }

    #flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
  </style>
</head>

<body>

<h2>Attendance Scanner</h2>

<video id="video" autoplay playsinline></video>

<h3 id="status">Starting...</h3>
<p id="name"></p>

<div id="flash"></div>

<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxFDKU5A6BXxJLrMkzrki4StPkZcU0SkkyAtK0YN5cIUC1ar08K-TquZxLuMZ5DfeA/exec";

let codeReader;
let scanning = true;

/* =========================
   PARSE PDF417 STRUCTURE
========================= */

function parseDNIData(raw) {

  const p = raw.split("@");

  return {
    dni: p[4] || "",
    apellido: p[1] || "",
    nombre: p[2] || ""
  };
}

/* =========================
   FLASH FEEDBACK
========================= */

function flash() {
  const f = document.getElementById("flash");
  f.style.opacity = 1;
  setTimeout(() => f.style.opacity = 0, 120);
}

/* =========================
   START SCANNER
========================= */

async function startScanner() {

  const video = document.getElementById("video");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  codeReader = new ZXingBrowser.BrowserMultiFormatReader();

  document.getElementById("status").textContent = "Scanning...";

  codeReader.decodeFromVideoDevice(
    undefined,
    video,
    (result, err) => {

      if (result && scanning) {

        scanning = false;

        const parsed = parseDNIData(result.getText());

        send(parsed);

        setTimeout(() => scanning = true, 1200);
      }
    }
  );
}

/* =========================
   SEND TO APPS SCRIPT
========================= */

function send(data) {

  flash();

  document.getElementById("status").textContent = "Processing...";

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "text/plain"
    }
  })
  .then(r => r.json())
  .then(showResult)
  .catch(err => {
    document.getElementById("status").textContent = err.toString();
  });
}

/* =========================
   UI RESULT
========================= */

function showResult(res) {

  if (res.status === "OK") {

    document.getElementById("status").className = "ok";
    document.getElementById("status").textContent = "OK";

    document.getElementById("name").textContent =
      res.nombre + " " + res.apellido;

  } else {

    document.getElementById("status").className = "bad";
    document.getElementById("status").textContent = "NOT FOUND";

    document.getElementById("name").textContent = "";
  }

}

/* =========================
   INIT
========================= */

startScanner();

</script>

</body>
</html>
